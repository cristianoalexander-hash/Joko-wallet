<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoKo Wallet - Enviar Dinero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/estilo.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-info">

    <div class="container">

        <a class="navbar-brand fw-bold" href="menu.html">
            JoKo Wallet
        </a>

        <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="menu.html">Inicio</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="deposit.html">Depositar</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="sendmoney.html">
                        Enviar Dinero
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="transactions.html">
                        Movimientos
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<main class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning">

                    <h2 class="text-center">
                        Enviar Dinero
                    </h2>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">
                            Buscar Contacto
                        </label>

                        <input
                            list="contactos"
                            id="destinatario"
                            class="form-control">

                        <datalist id="contactos">

                            <option value="Juan Pérez">
                            <option value="María González">
                            <option value="Carlos Díaz">

                        </datalist>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Monto
                        </label>

                        <input
                            type="number"
                            id="montoTransferencia"
                            class="form-control">

                    </div>

                    <button
                        id="btnTransferir"
                        class="btn btn-primary w-100">

                        Enviar Dinero

                    </button>

                    <hr>

                    <h4>Agregar Nuevo Contacto</h4>

                    <input
                        type="text"
                        id="nuevoContacto"
                        class="form-control mb-3">

                    <button
                        id="btnAgregar"
                        class="btn btn-warning">

                        Agregar Contacto

                    </button>

                    <ul
                        id="listaContactos"
                        class="list-group mt-4">

                    </ul>

                </div>

            </div>

        </div>

    </div>

</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

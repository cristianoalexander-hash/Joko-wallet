<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoKo Wallet - Depósito</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- CSS Personalizado -->
        <link rel="stylesheet" href="../assets/css/estilo.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-info">

        <div class="container">

            <a class="navbar-brand fw-bold" href="menu.html">
                JoKo Wallet
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="deposit.html">
                            Depositar
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="sendmoney.html">
                            Enviar Dinero
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="transactions.html">
                            Movimientos
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Contenido -->
    <main class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow">

                    <div class="card-header bg-warning text-center">

                        <h2>
                            Realizar Depósito
                        </h2>

                    </div>

                    <div class="card-body">

                        <h4 id="saldoActual" class="text-center mb-4">

                            Saldo Actual: $500.000

                        </h4>

                        <form id="depositForm">

                            <div class="mb-3">

                                <label class="form-label">

                                    Ingrese el monto

                                </label>

                                <input type="number" id="montoDeposito" class="form-control" min="1" required>

                            </div>

                            <button type="submit" id="btnDeposito" class="btn btn-success w-100">

                                Realizar Depósito

                            </button>

                        </form>

                        <div id="mensaje" class="alert alert-success mt-3 d-none">

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript + jQuery -->
    <script>

        let saldo = 500000;

        $(document).ready(function () {

            $(".card").hide().fadeIn(1200);

            $("#depositForm").submit(function (e) {

                e.preventDefault();

                let monto = parseInt($("#montoDeposito").val());

                if (isNaN(monto) || monto <= 0) {

                    alert("Ingrese un monto válido");

                    return;
                }

                saldo += monto;

                $("#saldoActual").text(
                    "Saldo Actual: $" + saldo.toLocaleString("es-CL")
                );

                $("#mensaje")
                    .removeClass("d-none")
                    .html(
                        "✅ Depósito realizado correctamente por $" +
                        monto.toLocaleString("es-CL")
                    );

                $("#montoDeposito").val("");

            });

        });

    </script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
